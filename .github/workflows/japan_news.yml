name: Japan News Aggregator

on:
  schedule:
    # 6 AM EST = 11:00 UTC  |  6 PM EST = 23:00 UTC
    - cron: "0 11 * * *"
    - cron: "0 23 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch-news:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run news aggregator
        run: python fetch_japan_news.py

      - name: Commit and push japan_news.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/japan_news.json
          git diff --cached --quiet || git commit -m "chore: update japan_news.json [$(date -u '+%Y-%m-%dT%H:%M:%SZ')]"
          git push
